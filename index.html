<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>SIGAP v4.1 — Service Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
:root{
  --navy:#1a2d5a;--navy2:#2d4a8a;--nlight:#85B7EB;
  --teal:#0F6E56;--teal2:#E1F5EE;--teal3:#085041;
  --blue:#185FA5;--blue2:#E6F1FB;--blue3:#0C447C;
  --green:#3B6D11;--green2:#EAF3DE;--green3:#27500A;
  --amber:#854F0B;--amber2:#FAEEDA;--amber3:#633806;
  --red:#A32D2D;--red2:#FCEBEB;--red3:#501313;
  --orange:#C45208;--orange2:#FDEBD7;
  --purple:#3C3489;--purple2:#EEEDFE;
  --g0:#FAFAF8;--g1:#F1EFE8;--g2:#E0DDD4;--g3:#C4C1B6;
  --g4:#888780;--g5:#555451;--g6:#333230;--g9:#1a1a1a;
  --rsm:6px;--rmd:10px;--rlg:14px;
  --font:'Plus Jakarta Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--g1);color:var(--g9);min-height:100vh;padding-bottom:70px}

/* ── App Bar ── */
.app-bar{background:var(--navy);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.ab-icon{width:34px;height:34px;background:var(--navy2);border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--nlight);flex-shrink:0}
.ab-title{font-size:14px;font-weight:700;color:#fff}
.ab-sub{font-size:10px;color:var(--nlight);margin-top:1px}
.ab-badge{margin-left:auto;background:var(--navy2);border-radius:var(--rsm);padding:3px 9px;font-size:10px;font-weight:700;color:var(--nlight);white-space:nowrap;flex-shrink:0}

.wrap{max-width:480px;margin:0 auto;padding:13px}

/* ── Bottom Nav ── */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g2);display:flex;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.bn-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-family:var(--font)}
.bn-btn i{font-size:20px;color:var(--g3)}
.bn-btn span{font-size:10px;font-weight:600;color:var(--g4)}
.bn-btn.active i{color:var(--navy)}
.bn-btn.active span{color:var(--navy)}
.bn-notif{width:7px;height:7px;background:var(--red);border-radius:50%;position:absolute;top:7px;right:calc(50% - 16px)}

/* ── Screens ── */
.scr{display:none}.scr.show{display:block}

/* ── Login Screen ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy2));padding:24px}
.login-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo i{font-size:40px;color:var(--navy)}
.login-title{font-size:22px;font-weight:700;color:var(--navy);margin-top:8px}
.login-sub{font-size:13px;color:var(--g4);margin-top:4px}
.role-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:20px}
.role-btn{border:2px solid var(--g2);border-radius:var(--rlg);padding:14px;cursor:pointer;background:#fff;transition:all .15s;display:flex;align-items:center;gap:12px;font-family:var(--font);width:100%;text-align:left;-webkit-tap-highlight-color:rgba(0,0,0,.1);user-select:none}
.role-btn:hover{border-color:var(--navy);background:var(--blue2)}
.role-btn:active{transform:scale(.98);background:var(--blue2)}
.role-btn.sel{border-color:var(--navy);background:var(--blue2)}
.role-btn i{font-size:24px;color:var(--g3);pointer-events:none}
.role-btn.sel i{color:var(--navy)}
.role-name{pointer-events:none}
.role-desc{pointer-events:none}
.role-name{font-size:14px;font-weight:700;color:var(--g6);text-align:left}
.role-desc{font-size:11px;color:var(--g4);text-align:left;margin-top:2px}
.pin-wrap{margin-bottom:16px}
.pin-label{font-size:11px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.pin-input{width:100%;background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:11px 14px;font-size:16px;color:var(--g9);font-family:var(--font);outline:none;letter-spacing:4px;text-align:center}
.pin-input:focus{border-color:var(--navy)}
.btn-login{width:100%;background:var(--navy);border:none;border-radius:var(--rmd);padding:13px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;font-family:var(--font)}

/* ── Step progress ── */
.step-wrap{background:#fff;border-radius:var(--rlg);padding:10px 13px 8px;margin-bottom:10px;border:1px solid var(--g2);box-shadow:var(--shadow)}
.step-dots{display:flex;gap:3px;margin-bottom:5px}
.sdot{height:4px;border-radius:2px;flex:1;background:var(--g2);transition:background .25s}
.sdot.done{background:var(--teal)}.sdot.active{background:var(--blue)}
.step-info{display:flex;justify-content:space-between;align-items:center}
.step-name{font-size:12px;font-weight:700;color:var(--g6)}
.step-num{font-size:10px;color:var(--g4)}

/* ── Tahap badge ── */
.tahap-badge{display:flex;align-items:center;gap:8px;background:#fff;border-radius:var(--rlg);padding:10px 13px;margin-bottom:10px;border:1px solid var(--g2);box-shadow:var(--shadow)}
.tb-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.tb-title{font-size:13px;font-weight:700;color:var(--g6)}
.tb-sub{font-size:10px;color:var(--g4);margin-top:1px}
.tb-status{margin-left:auto;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}

/* ── Cards ── */
.card{background:#fff;border-radius:var(--rlg);border:1px solid var(--g2);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:10px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--g1);background:var(--g0)}
.card-hdr i{font-size:15px}
.card-hdr-t{font-size:12px;font-weight:700;color:var(--g5)}
.card-body{padding:12px 13px;display:flex;flex-direction:column;gap:9px}

/* ── Form elements ── */
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.06em}
.fl-req::after{content:' *';color:var(--red)}
.fi{width:100%;background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 11px;font-size:13px;color:var(--g9);font-family:var(--font);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--blue);background:#fff}
.fsel{width:100%;background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 11px;font-size:13px;color:var(--g9);font-family:var(--font);outline:none}
.fta{width:100%;background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 11px;font-size:13px;color:var(--g9);font-family:var(--font);outline:none;resize:vertical;line-height:1.5}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── Unit & Job select ── */
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.unit-btn{border:1.5px solid var(--g2);border-radius:var(--rlg);padding:14px 10px 11px;cursor:pointer;text-align:center;background:#fff;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:var(--shadow)}
.unit-btn i{font-size:22px;color:var(--g3)}
.unit-btn-name{font-size:12px;font-weight:700;color:var(--g6)}
.unit-btn-sub{font-size:10px;color:var(--g4);line-height:1.3}
.unit-btn.sel{border-color:var(--blue);border-width:2px;background:var(--blue2)}
.unit-btn.sel i,.unit-btn.sel .unit-btn-name{color:var(--blue3)}
.job-grid{display:flex;flex-direction:column;gap:6px}
.job-btn{border:1px solid var(--g2);border-radius:var(--rmd);padding:11px 13px;cursor:pointer;background:#fff;transition:all .15s;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.job-btn i{font-size:18px;color:var(--g3);flex-shrink:0}
.job-btn-name{font-size:13px;font-weight:600;color:var(--g6)}
.job-btn-desc{font-size:10px;color:var(--g4);margin-top:1px}
.job-btn.sel{border-color:var(--teal);background:var(--teal2)}
.job-btn.sel i,.job-btn.sel .job-btn-name{color:var(--teal3)}

/* ── Checklist ── */
.ci{display:flex;align-items:flex-start;gap:9px;padding:8px 11px;border:1px solid var(--g2);border-radius:var(--rmd);cursor:pointer;background:var(--g0);transition:all .15s;margin-bottom:5px}
.ci.on{border-color:#5DCAA5;background:var(--teal2)}
.ci input[type=checkbox]{width:15px;height:15px;margin-top:1px;flex-shrink:0;accent-color:var(--teal);cursor:pointer}
.ci-text{font-size:12px;color:var(--g9);line-height:1.4}
.ci.on .ci-text{color:var(--teal3);font-weight:500}

/* ── Condition items ── */
.cond-item{background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 11px;margin-bottom:5px}
.cond-label{font-size:12px;font-weight:600;color:var(--g9);margin-bottom:6px}
.cond-btns{display:flex;gap:4px}
.cb{flex:1;padding:6px 4px;border:1px solid var(--g2);border-radius:var(--rsm);font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:var(--g4);font-family:var(--font);text-align:center;transition:all .15s}
.cb.ok{background:var(--green2);border-color:#97C459;color:var(--green3)}
.cb.warn{background:var(--amber2);border-color:#EF9F27;color:var(--amber3)}
.cb.bad{background:var(--red2);border-color:#F09595;color:var(--red3)}

/* ── Measure rows ── */
.mr{background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 11px;margin-bottom:6px}
.mr.mr-ng{border-color:var(--red);background:var(--red2)}
.mr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:7px}
.mr-label{font-size:12px;font-weight:600;color:var(--g9)}
.mr-normal{font-size:10px;color:var(--g4);margin-top:2px}
.mr-req{color:var(--red);font-size:10px;font-weight:700}
.mr-status{display:flex;gap:3px;flex-shrink:0}
.ms{padding:5px 8px;border:1px solid var(--g2);border-radius:var(--rsm);font-size:10px;font-weight:700;cursor:pointer;background:#fff;color:var(--g4);font-family:var(--font);transition:all .15s}
.ms.ok{background:var(--green2);border-color:#97C459;color:var(--green3)}
.ms.ng{background:var(--red2);border-color:#F09595;color:var(--red3)}
.mr input{width:100%;background:#fff;border:1px solid var(--g2);border-radius:var(--rsm);padding:7px 10px;font-size:12px;color:var(--g9);font-family:var(--font);outline:none}
.mr.mr-ng input{background:var(--red2)}

/* ── Before/After compare ── */
.ba-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ba-box{background:var(--g0);border:1px solid var(--g2);border-radius:var(--rmd);padding:9px 10px}
.ba-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:4px}
.ba-before .ba-label{color:var(--amber3)}
.ba-after .ba-label{color:var(--teal3)}
.ba-after{border-color:#5DCAA5}
.ba-val{font-size:15px;font-weight:700;color:var(--g9)}
.ba-unit{font-size:10px;color:var(--g4);margin-top:2px}
.ba-input{width:100%;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--g9);font-family:var(--font);outline:none;padding:0}

/* ── Critical notes ── */
.crit-box{background:#FFFBF0;border:1.5px solid #EF9F27;border-radius:var(--rmd);padding:10px 12px}
.crit-hdr{font-size:11px;font-weight:700;color:var(--amber3);display:flex;align-items:center;gap:5px;margin-bottom:8px}
.crit-note{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:11px;color:var(--amber3);border-bottom:1px solid #F5E5C0}
.crit-note:last-child{border-bottom:none}
.crit-note input{width:14px;height:14px;margin-top:1px;flex-shrink:0;accent-color:#EF9F27;cursor:pointer}

/* ── Photo upload ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.photo-slot{aspect-ratio:1;border:1.5px dashed var(--g2);border-radius:var(--rmd);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--g0);position:relative;overflow:hidden}
.photo-slot i{font-size:18px;color:var(--g3)}
.photo-slot span{font-size:9px;color:var(--g4);margin-top:3px;text-align:center;line-height:1.3;padding:0 3px}
.photo-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-slot .pdel{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-slot input{display:none}

/* ── Confidence ── */
.conf-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.conf-btn{border:1.5px solid var(--g2);border-radius:var(--rmd);padding:9px 10px;cursor:pointer;text-align:center;font-family:var(--font);background:#fff;transition:all .15s}
.conf-btn.sel{border-width:2px}
.conf-label{font-size:12px;font-weight:700}
.conf-desc{font-size:10px;margin-top:2px;opacity:.8}

/* ── Alerts ── */
.warn-bar{background:var(--amber2);border-left:3px solid #EF9F27;border-radius:0 var(--rmd) var(--rmd) 0;padding:8px 12px;font-size:11px;font-weight:500;color:var(--amber3);display:flex;gap:8px;margin-bottom:10px}
.danger-bar{background:var(--red2);border-left:3px solid #E24B4A;border-radius:0 var(--rmd) var(--rmd) 0;padding:8px 12px;font-size:11px;font-weight:500;color:var(--red3);display:flex;gap:8px;margin-bottom:10px}
.info-bar{background:var(--blue2);border-left:3px solid var(--blue);border-radius:0 var(--rmd) var(--rmd) 0;padding:8px 12px;font-size:11px;font-weight:500;color:var(--blue3);display:flex;gap:8px;margin-bottom:10px}
.success-bar{background:var(--green2);border-left:3px solid #5DCAA5;border-radius:0 var(--rmd) var(--rmd) 0;padding:8px 12px;font-size:11px;font-weight:500;color:var(--green3);display:flex;gap:8px;margin-bottom:10px}

/* ── Waiting screen ── */
.waiting-card{background:#fff;border-radius:var(--rlg);padding:28px 20px;text-align:center;border:1px solid var(--g2);box-shadow:var(--shadow)}
.waiting-icon{font-size:40px;color:var(--amber);margin-bottom:12px}
.waiting-title{font-size:16px;font-weight:700;color:var(--g6)}
.waiting-sub{font-size:12px;color:var(--g4);margin-top:6px;line-height:1.6}
.waiting-wo{background:var(--navy);color:#fff;border-radius:var(--rsm);padding:6px 14px;font-size:13px;font-weight:700;display:inline-block;margin:10px 0}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Nav buttons ── */
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn-back{background:#fff;border:1px solid var(--g2);border-radius:var(--rmd);padding:11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--g4);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}
.btn-next{background:var(--navy);border:none;border-radius:var(--rmd);padding:11px;font-size:13px;font-weight:600;cursor:pointer;color:#fff;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}
.btn-submit-1{background:var(--amber);border:none;border-radius:var(--rmd);padding:13px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;font-family:var(--font);width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px}
.btn-submit-2{background:var(--teal);border:none;border-radius:var(--rmd);padding:13px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;font-family:var(--font);width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px}
.btn-submit-2:disabled{opacity:.5;pointer-events:none}

/* ── Success ── */
.success-card{background:var(--teal2);border:1px solid #5DCAA5;border-radius:var(--rlg);padding:22px;text-align:center;margin:10px 0}
.btn-wa{background:#1D9E75;border:none;border-radius:var(--rmd);padding:12px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;font-family:var(--font);width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px}
.btn-new{background:transparent;border:1px solid var(--g2);border-radius:var(--rmd);padding:10px;font-size:12px;cursor:pointer;color:var(--g4);font-family:var(--font);width:100%;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}

/* ── Dashboard ── */
.dash-hdr{background:linear-gradient(135deg,#0B3D24,#1D6B3A);border-radius:var(--rlg);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.dh-top{display:flex;justify-content:space-between;align-items:flex-start}
.dh-title{font-size:15px;font-weight:700;color:#fff}
.dh-sub{font-size:11px;color:#9FE1CB;margin-top:2px}
.dh-badge{background:rgba(255,255,255,.15);border-radius:8px;padding:5px 10px;font-size:11px;color:#9FE1CB;font-weight:700}
.dh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px}
.dhs{background:rgba(255,255,255,.12);border-radius:var(--rmd);padding:8px 10px;text-align:center}
.dhs-val{font-size:20px;font-weight:700;color:#fff}
.dhs-label{font-size:9px;color:#9FE1CB;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}

/* ── Owner banner ── */
.owner-banner{background:linear-gradient(135deg,var(--purple),#5A4FD4);border-radius:var(--rlg);padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ob-icon{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0}
.ob-title{font-size:13px;font-weight:700;color:#fff}
.ob-sub{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}
.ob-badge{margin-left:auto;background:rgba(255,255,255,.2);border-radius:var(--rsm);padding:3px 9px;font-size:10px;font-weight:700;color:#fff}

.dash-filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.dchip{background:#fff;border:1px solid var(--g2);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;color:var(--g4);white-space:nowrap;font-family:var(--font);flex-shrink:0}
.dchip.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* ── Job cards ── */
.job-card{background:#fff;border:1px solid var(--g2);border-radius:var(--rlg);padding:12px 13px;margin-bottom:9px;box-shadow:var(--shadow)}
.jc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.jc-unit{font-size:13px;font-weight:700;color:var(--g9)}
.jc-id{font-size:10px;color:var(--g4);font-weight:400}
.jc-time{font-size:10px;color:var(--g4);white-space:nowrap}
.jc-badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.bdg{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.jc-meta{font-size:11px;color:var(--g4);display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.jc-meta span{display:flex;align-items:center;gap:3px}
.risk-bar{height:3px;border-radius:2px;margin-top:7px;overflow:hidden;background:var(--g2)}
.risk-fill{height:100%;border-radius:2px}

/* ── Parameter review in dashboard ── */
.param-review{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.pr-item{background:var(--g0);border-radius:var(--rsm);padding:6px 8px;border:1px solid var(--g2)}
.pr-item.ng{background:var(--red2);border-color:var(--red)}
.pr-label{font-size:9px;color:var(--g4);font-weight:600}
.pr-val{font-size:12px;font-weight:700;color:var(--g9);margin-top:1px}
.pr-normal{font-size:9px;color:var(--g4)}
.pr-item.ng .pr-label,.pr-item.ng .pr-val{color:var(--red3)}

/* ── Decision buttons ── */
.decision-wrap{background:var(--g0);border-radius:var(--rmd);padding:12px;border:1px solid var(--g2);margin-top:10px}
.decision-title{font-size:11px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.decision-msg{margin-bottom:8px}
.decision-msg textarea{width:100%;background:#fff;border:1px solid var(--g2);border-radius:var(--rsm);padding:8px 10px;font-size:12px;color:var(--g9);font-family:var(--font);outline:none;resize:none;line-height:1.5}
.dec-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.dec-btn{border:none;border-radius:var(--rsm);padding:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:4px}
.dec-approve{background:var(--green2);color:var(--green3)}
.dec-revisi{background:var(--amber2);color:var(--amber3)}
.dec-tahan{background:var(--blue2);color:var(--blue3)}
.dec-tolak{background:var(--red2);color:var(--red3)}

.jc-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--g1)}
.jc-detail.open{display:block}
.jd-sec{margin-bottom:10px}
.jd-sec-title{font-size:10px;font-weight:700;color:var(--g4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.jd-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;font-size:11px;gap:8px;border-bottom:1px solid var(--g1)}
.jd-label{color:var(--g4);flex-shrink:0;min-width:90px}
.jd-val{color:var(--g6);font-weight:600;text-align:right}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--g4);font-size:11px;padding:0;font-family:var(--font);display:flex;align-items:center;gap:4px;margin-top:7px;font-weight:600}

/* ── Riwayat ── */
.hist-item{background:#fff;border:1px solid var(--g2);border-radius:var(--rlg);padding:12px 13px;margin-bottom:8px;box-shadow:var(--shadow)}

/* ── Empty ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--g4)}
.empty i{font-size:36px;display:block;margin-bottom:8px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .2s ease both}
</style>

/* =============================================
   LOGIN
   ============================================= */
function selectRole(r){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('sel'));
  const btn=document.getElementById('role-'+r);
  if(btn) btn.classList.add('sel');
  role=r;
  // Visual feedback
  document.getElementById('pin-input').focus();
}

function doLogin(){
  const pin = document.getElementById('pin-input').value;
  const err = document.getElementById('login-err');
  const btn = document.querySelector('.btn-login');
  if(!role){ err.textContent='Pilih role dulu!'; err.style.display='block'; return; }
  if(!pin){ err.textContent='Masukkan PIN!'; err.style.display='block'; return; }

  // Tampilkan loading
  btn.innerHTML='<i class="ti ti-loader-2"></i> Memverifikasi...';
  btn.disabled=true;
  err.style.display='none';

  // Fetch PIN dari Google Sheets
  const cbName = 'sigap_login_' + Date.now();
  const script = document.createElement('script');
  const timeout = setTimeout(()=>{
    delete window[cbName];
    try{ document.body.removeChild(script); }catch(e){}
    btn.innerHTML='Masuk <i class="ti ti-arrow-right"></i>';
    btn.disabled=false;
    err.textContent='Koneksi gagal. Coba lagi.';
    err.style.display='block';
  }, 8000);

  window[cbName] = function(data){
    clearTimeout(timeout);
    delete window[cbName];
    try{ document.body.removeChild(script); }catch(e){}
    btn.innerHTML='Masuk <i class="ti ti-arrow-right"></i>';
    btn.disabled=false;

    if(data && data.pins && data.pins[role]){
      if(pin === data.pins[role]){
        err.style.display='none';
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-app').style.display='block';
        loadJobs();
        initApp();
      } else {
        err.textContent='PIN salah, coba lagi';
        err.style.display='block';
        document.getElementById('pin-input').value='';
      }
    } else {
      // Fallback: PIN belum disetup di Sheets, pakai default
      err.textContent='PIN belum dikonfigurasi. Hubungi admin sistem.';
      err.style.display='block';
    }
  };

  script.src = GAS_URL + '?action=getPins&callback=' + cbName;
  script.onerror = ()=>{
    clearTimeout(timeout);
    btn.innerHTML='Masuk <i class="ti ti-arrow-right"></i>';
    btn.disabled=false;
    err.textContent='Koneksi gagal. Coba lagi.';
    err.style.display='block';
  };
  document.body.appendChild(script);
}

function initApp(){
  const roleNames = { teknisi:'Teknisi', katek:'Kepala Teknisi', owner:'Owner' };
  document.getElementById('ab-sub').textContent = roleNames[role] + ' — SIGAP v4';
  // Owner: hide form tab, show only dash & hist
  if(role==='owner'){
    document.getElementById('nav-form').style.display='none';
    navTo('dash');
  } else if(role==='admin'){
    document.getElementById('nav-form').style.display='none';
    navTo('dash');
  } else {
    navTo('form');
  }
  updateNotifDot();
}

/* =============================================
   NAVIGATION
   ============================================= */
function navTo(scr){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('scr-'+scr).classList.add('show');
  const navBtn = document.getElementById('nav-'+scr);
  if(navBtn) navBtn.classList.add('active');
  if(scr==='form'){ if(!S.unit) renderUnitSelect(); }
  else if(scr==='dash') renderDash();
  else if(scr==='hist') renderHist();
  else if(scr==='unit') renderAddUnit();
}

function updateNotifDot(){
  const dot = document.getElementById('notif-dot');
  if(!dot) return;
  const pending = jobs.filter(j=>j.status==='menunggu-review').length;
  dot.style.display = (pending>0 && (role==='katek'||role==='owner')) ? 'block' : 'none';
}

function checkApproval(woId){
  // Fetch status langsung dari Google Sheets
  const btn = document.querySelector('[onclick*="checkApproval"]');
  if(btn){ btn.innerHTML = '<i class="ti ti-loader-2"></i> Mengecek...'; btn.style.pointerEvents='none'; }

  const cbName = 'sigap_chk_' + Date.now();
  const script = document.createElement('script');
  const timeout = setTimeout(()=>{
    delete window[cbName];
    try{ document.body.removeChild(script); }catch(e){}
    // Fallback ke local jobs
    checkApprovalLocal(woId);
    if(btn){ btn.innerHTML = '<i class="ti ti-refresh"></i> Cek status persetujuan'; btn.style.pointerEvents='auto'; }
  }, 8000);

  window[cbName] = function(data){
    clearTimeout(timeout);
    delete window[cbName];
    try{ document.body.removeChild(script); }catch(e){}
    if(btn){ btn.innerHTML = '<i class="ti ti-refresh"></i> Cek status persetujuan'; btn.style.pointerEvents='auto'; }

    if(data && data.jobs){
      // Cari WO di data sheets
      const sheetJob = data.jobs.find(j => j.id === woId);
      if(sheetJob){
        // Update local jobs
        const localIdx = jobs.findIndex(j=>j.id===woId);
        if(localIdx>-1){
          jobs[localIdx].status = sheetJob.status;
          jobs[localIdx].pesanKatek = sheetJob.pesanKatek;
          saveJobs();
        }
        processApprovalStatus(woId, sheetJob.status, sheetJob.pesanKatek||'');
      } else {
        checkApprovalLocal(woId);
      }
    } else {
      checkApprovalLocal(woId);
    }
  };

  script.src = GAS_URL + '?action=getJobs&callback=' + cbName;
  script.onerror = ()=>{ clearTimeout(timeout); checkApprovalLocal(woId); };
  document.body.appendChild(script);
}

function checkApprovalLocal(woId){
  const job = jobs.find(j=>j.id===woId);
  const status = job ? job.status : 'menunggu-review';
  const pesan = job ? (job.pesanKatek||'') : '';
  processApprovalStatus(woId, status, pesan);
}

function processApprovalStatus(woId, status, pesan){
  if(status==='disetujui'){
    const section=document.getElementById('customer-confirm-section');
    if(section) section.style.display='block';
    const adminMsg=sessionStorage.getItem('sigap_admin_msg_'+woId);
    if(adminMsg) window.open('https://wa.me/'+WA_ADMIN+'?text='+adminMsg,'_blank');
  } else if(status==='customer-lanjut'){
    const job=jobs.find(j=>j.id===woId);
    S=job&&job.stateSnapshot?job.stateSnapshot:S;
    S.tahap=2; S.step=0;
    renderTahap2();
  } else if(status==='customer-stop'){
    alert('Customer memilih stop. Pekerjaan selesai sampai pemeriksaan. Catat sebagai Diagnosa Only.');
    resetForm();
  } else if(status==='revisi'){
    alert('Kepala teknisi meminta revisi. Pesan: '+(pesan||'Ulangi pemeriksaan'));
    const job=jobs.find(j=>j.id===woId);
    if(job&&job.stateSnapshot){ S=job.stateSnapshot; S.tahap=1; S.step=1; renderTahap1(); }
  } else if(status==='ditahan'){
    alert('Pekerjaan ditahan sementara. Pesan: '+(pesan||'Tunggu instruksi lebih lanjut'));
  } else if(status==='ditolak'){
    alert('Pekerjaan ditolak. Pesan: '+(pesan||'Hubungi kepala teknisi'));
  } else {
    alert('Belum ada keputusan dari kepala teknisi. Silakan tunggu atau hubungi kepala teknisi.');
  }
}

function customerDecision(decision, woId){
  const catatan = document.getElementById('catatan-customer')?.value || '';
  const jobIdx = jobs.findIndex(j=>j.id===woId);
  if(jobIdx === -1) return;

  const status = decision === 'lanjut' ? 'customer-lanjut' : 'customer-stop';
  jobs[jobIdx].status = status;
  jobs[jobIdx].catatanCustomer = catatan;
  saveJobs();

  // Update ke Sheets
  sendToSheets({ action:'updateStatus', fno:woId, status, pesan_katek:'Customer: '+decision+(catatan?' — '+catatan:'') });

  if(decision === 'lanjut'){
    // WA ke katek & admin: customer setuju
    const job = jobs[jobIdx];
    const waMsg = encodeURIComponent('[SIGAP - CUSTOMER SETUJU LANJUT]' + '\nWO: ' + woId + '\nCustomer: ' + job.customer + '\nTeknisi: ' + job.teknisi + ' akan mulai pekerjaan.' + (catatan ? '\nCatatan: ' + catatan : '') + '\n\nTeknisi akan lanjut ke Tahap 2');
    window.open('https://wa.me/'+WA_KATEK+'?text='+waMsg,'_blank');

    // Lanjut ke Tahap 2
    S = jobs[jobIdx].stateSnapshot || S;
    S.tahap=2; S.step=0;
    renderTahap2();
  } else {
    // Customer stop
    const job = jobs[jobIdx];
    const waMsg = encodeURIComponent('[SIGAP - CUSTOMER STOP]' + '\nWO: ' + woId + '\nCustomer: ' + job.customer + '\nPekerjaan selesai sampai pemeriksaan (Diagnosa Only).' + (catatan ? '\nAlasan: ' + catatan : '') + '\n\nDicatat sebagai Diagnosa Only');
    window.open('https://wa.me/'+WA_KATEK+'?text='+waMsg,'_blank');
    alert('Pekerjaan selesai. Customer memilih tidak melanjutkan perbaikan. Tercatat sebagai Diagnosa Only.');
    resetForm();
  }
}

/* =============================================
   SUBMIT TAHAP 2
   ============================================= */
async function submitTahap2(){
  saveFD();
  const fd=S.fd;
  const ud=UNIT_DATA[S.unit];
  const u=UNITS.find(x=>x.id===S.unit);
  const jt=JOB_TYPES[S.unit]?.find(j=>j.id===S.jobType);

  const btn=document.querySelector('.btn-submit-2');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Mengirim...';}

  const tindakanText=(S.tindakan.map(i=>(ud['tindakan_'+S.jobType]||ud.tindakan_service||[])[i]).filter(Boolean).join(', ')+(fd['f-tindakan-lain']?', '+fd['f-tindakan-lain']:'')).trim();
  const penyebabList=['Freon kurang/bocor','Komponen rusak/lemah','Kotoran/tersumbat','Instalasi tidak tepat','Keausan normal','Kerusakan mekanik','Kerusakan elektrik/PCB','Pemakaian tidak tepat','Lainnya'];
  const penyebabText=S.penyebab.map(i=>penyebabList[i]).filter(Boolean).join(', ')+(fd['f-penyebab-detail']?', '+fd['f-penyebab-detail']:'');
  const criticalText=S.critical.map(i=>(ud.critical||[])[i]).filter(Boolean).join('; ')+(fd['f-critical-lain']?'; '+fd['f-critical-lain']:'');
  const jasa=parseInt(fd['f-jasa']||0);
  const part=parseInt(fd['f-part']||0);
  const total=jasa+part;

  const paramSesudah=(ud.measures||[]).map((m,i)=>{
    const val=S.mVals['ma-'+i]||document.getElementById('ma-'+i)?.value||'';
    return val?m.l+': '+val+' '+m.u:'';
  }).filter(Boolean).join(' | ');

  const payload={
    wo_id:S.wo_id, tahap:'2-laporan',
    unit:u.name, jenis_pekerjaan:jt?.name||'',
    teknisi:fd['f-tek-nama']||'', teknisi_wa:fd['f-tek-wa']||'',
    cust_nama:fd['f-cust-nama']||'', cust_telp:fd['f-cust-telp']||'',
    cust_alamat:fd['f-cust-alamat']||'',
    unit_merk:fd['f-unit-merk']||'', unit_model:fd['f-unit-model']||'',
    penyebab:penyebabText, tindakan:tindakanText,
    sparepart:fd['f-sparepart']||'',
    param_sesudah:paramSesudah,
    biaya_jasa:jasa, biaya_part:part, total_biaya:total,
    status_akhir:fd['f-status-akhir']||'',
    waktu:fd['f-waktu']||'',
    confidence:S.confidence||'',
    critical_notes:criticalText,
    rekomendasi:fd['f-rekomendasi']||'',
    catatan_teknisi:fd['f-catatan-tek']||'',
    status:'selesai-menunggu-qc',
    timestamp:new Date().toISOString()
  };

  sendToSheets(payload);

  // Update job di lokal
  const jobIdx=jobs.findIndex(j=>j.id===S.wo_id);
  if(jobIdx>-1){
    jobs[jobIdx].tahap='2';
    jobs[jobIdx].status='selesai-menunggu-qc';
    jobs[jobIdx].tindakan=tindakanText;
    jobs[jobIdx].penyebab=penyebabText;
    jobs[jobIdx].paramSesudah=paramSesudah;
    jobs[jobIdx].biaya=total;
    jobs[jobIdx].confidence=S.confidence||'';
    jobs[jobIdx].criticalNotes=criticalText;
    jobs[jobIdx].rekomendasi=fd['f-rekomendasi']||'';
  }
  saveJobs();
  updateNotifDot();

  // WA ke Katek + Owner
  const waMsg=encodeURIComponent(
    '*[SIGAP — LAPORAN HASIL PEKERJAAN]*\n'+
    'WO: '+S.wo_id+'\n'+
    'Unit: '+u.name+' — '+jt?.name+'\n'+
    'Teknisi: '+(fd['f-tek-nama']||'')+'\n'+
    'Customer: '+(fd['f-cust-nama']||'')+'\n'+
    'Penyebab: '+penyebabText+'\n'+
    'Tindakan: *'+tindakanText+'*\n'+
    'Confidence: '+(S.confidence||'')+'\n'+
    'Est. biaya: Rp '+total.toLocaleString('id-ID')+'\n'+
    'Status: '+(fd['f-status-akhir']||'')+'\n'+
    (criticalText?'⚠ Kritis: '+criticalText+'\n':'')+
    '\n_Buka dashboard SIGAP untuk QC final_'
  );

  // Render success
  const fc=document.getElementById('form-content');
  document.getElementById('step-wrap').style.display='none';
  fc.innerHTML=`
    <div class="success-card anim">
      <div style="font-size:32px;color:var(--teal);margin-bottom:8px"><i class="ti ti-circle-check"></i></div>
      <div style="font-size:16px;font-weight:700;color:var(--teal3)">Laporan Hasil Terkirim!</div>
      <div style="font-size:12px;color:var(--teal);margin-top:5px">${u.name} — ${jt?.name}</div>
      <div style="font-size:11px;color:var(--teal);margin-top:3px;opacity:.8">${fd['f-unit-merk']||''} · ${fd['f-cust-nama']||''}</div>
      <div style="font-size:11px;color:var(--teal);margin-top:2px;opacity:.7">Total: Rp ${total.toLocaleString('id-ID')} · ${S.confidence||''}</div>
      ${criticalText?`<div style="background:#FFF3CD;border-radius:6px;padding:7px 10px;margin-top:8px;font-size:11px;color:var(--amber3)">⚠ ${criticalText.split(';')[0]}</div>`:''}
    </div>
    <button class="btn-wa" onclick="window.open('https://wa.me/${WA_KATEK}?text=${waMsg}','_blank')">
      <i class="ti ti-brand-whatsapp"></i> Kirim notifikasi WA ke Kepala Teknisi
    </button>
    <button class="btn-new" onclick="resetForm()">
      <i class="ti ti-plus"></i> Work order baru
    </button>`;
}

  const dc=document.getElementById('dash-content');

  const total=jobs.length;
  const needReview=jobs.filter(j=>j.status==='menunggu-review').length;
  const approved=jobs.filter(j=>j.status==='disetujui').length;
  const qc=jobs.filter(j=>j.status==='selesai-menunggu-qc').length;
  const done=jobs.filter(j=>j.status==='selesai').length;

  let h='';

    h+=`<div class="owner-banner">

  } else {

        <div><div class="dh-title">Dashboard Kepala Teknisi</div>
          <div class="dh-sub">${new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'})}</div>
        </div>
        <div class="dh-badge">${needReview} perlu review</div>
      </div>

        <div class="dhs"><div class="dhs-val">${total}</div><div class="dhs-label">Total WO</div></div>

        <div class="dhs"><div class="dhs-val" style="color:#A5F3C8">${approved}</div><div class="dhs-label">Disetujui</div></div>
        <div class="dhs"><div class="dhs-val" style="color:#93C5FD">${qc}</div><div class="dhs-label">QC Final</div></div>
        <div class="dhs"><div class="dhs-val" style="color:#FCA5A5">${urgent}</div><div class="dhs-label">Urgen</div></div>
        <div class="dhs"><div class="dhs-val" style="color:#A5F3C8">${done}</div><div class="dhs-label">Selesai</div></div>

function setDashFilter(k,btn){
  dashFilter=k;
  document.querySelectorAll('.dchip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderJobCards();
}

function renderJobCards(){
  const el=document.getElementById('d-jobs');
  if(!el) return;
  const f=dashFilter;
  const filtered=jobs.filter(j=>{
    if(f==='semua') return true;
    if(f.startsWith('unit-')) return j.unit===UNITS.find(u=>u.id===f.replace('unit-',''))?.name;
    const jStatus=(j.status||'').toLowerCase().trim();
    return jStatus===f || jStatus.includes(f) || f.includes(jStatus);
  });
  if(!filtered.length){el.innerHTML='<div class="empty"><i class="ti ti-inbox"></i>Tidak ada pekerjaan</div>';return;}

  const statusMap={
    'menunggu-review':{bg:'#FAEEDA',tc:'#633806',l:'🔔 Perlu Review'},

function customerDecisionDash(i, decision){

    if(f.startsWith('unit-')) return j.unit===UNITS.find(u=>u.id===f.replace('unit-',''))?.name;

  saveJobs();
  sendToSheets({action:'updateStatus',fno:job.id,status,pesan_katek:'Customer: '+decision+(catatan?' - '+catatan:'')});

async function giveDecision(i,decision){
  const filtered=jobs.filter(j=>{
    const f=dashFilter;
    if(f==='semua') return true;
    if(f.startsWith('unit-')) return j.unit===UNITS.find(u=>u.id===f.replace('unit-',''))?.name;
    return j.status===f;
  });
  const job=filtered[i];
  if(!job) return;

  const msgEl=document.getElementById('msg-'+i);
  const pesan=msgEl?msgEl.value.trim():'';
  const jobIdx=jobs.indexOf(job);

  jobs[jobIdx].status=decision;
  jobs[jobIdx].keputusan=decision;
  jobs[jobIdx].pesanKatek=pesan;
  saveJobs();

  // Kirim ke Sheets
  sendToSheets({
    action:'updateStatus',
    fno:job.id,
    status:decision,
    pesan_katek:pesan,
    timestamp:new Date().toISOString()
  });

  // WA ke teknisi
  const decisionLabels={
    'disetujui':'✅ DISETUJUI — Silakan mulai pekerjaan',
    'revisi':'🔄 REVISI — Ulangi pemeriksaan',
    'ditahan':'⏸ DITAHAN — Tunggu instruksi lebih lanjut',
    'ditolak':'❌ DITOLAK — Hubungi kepala teknisi',
    'selesai':'✅ SELESAI — Pekerjaan dinyatakan selesai oleh kepala teknisi'
  };
  const waMsg=encodeURIComponent(
    '*[SIGAP — KEPUTUSAN KEPALA TEKNISI]*\n'+
    'WO: '+job.id+'\n'+
    'Status: '+decisionLabels[decision]+'\n'+
    (pesan?'Pesan: '+pesan+'\n':'')+
    '\n_Login ke SIGAP untuk melihat detail dan melanjutkan pekerjaan_'
  );

  // WA ke Owner (notifikasi keputusan)
  const ownerMsg=encodeURIComponent(
    '*[SIGAP — LAPORAN KEPUTUSAN KATEK]*\n'+
    'Kepala teknisi baru saja memberikan keputusan:\n'+
    'WO: '+job.id+'\n'+
    'Unit: '+job.unit+' — '+job.merk+'\n'+
    'Teknisi: '+job.teknisi+'\n'+
    'Customer: '+job.customer+'\n'+
    'Keputusan: '+decisionLabels[decision]+'\n'+
    (pesan?'Pesan: '+pesan+'\n':'')+
    '\n_Buka dashboard SIGAP untuk monitor_'
  );

  // Buka WA ke teknisi, owner, dan admin (jika approve)
  const tekWa=job.teknisiWa||'';
  if(tekWa){
    window.open('https://wa.me/'+tekWa+'?text='+waMsg,'_blank');
    setTimeout(()=>window.open('https://wa.me/'+WA_OWNER+'?text='+ownerMsg,'_blank'),1500);
  } else {
    window.open('https://wa.me/'+WA_OWNER+'?text='+ownerMsg,'_blank');
  }
  // Jika approve, kirim juga ke Admin
  if(decision==='disetujui'){
    const adminMsg=sessionStorage.getItem('sigap_admin_msg_'+job.id);
    if(adminMsg) setTimeout(()=>window.open('https://wa.me/'+WA_ADMIN+'?text='+adminMsg,'_blank'),2500);
  }

  renderDash();
}

function sendToSheets(payload){
  try{
    const cbName='sigap_send_'+Date.now();
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    const script=document.createElement('script');
    const to=setTimeout(()=>{delete window[cbName];try{document.body.removeChild(script);}catch(e){}},10000);
    window[cbName]=function(resp){clearTimeout(to);delete window[cbName];try{document.body.removeChild(script);}catch(e){};console.log('Saved:',resp);};
    script.src=GAS_URL+'?action=save&callback='+cbName+'&d='+encoded;
    script.onerror=()=>{clearTimeout(to);try{document.body.removeChild(script);}catch(e){}};
    document.body.appendChild(script);
  }catch(e){console.error('Send error:',e);}
}

function fetchFromSheets(){
  return new Promise(resolve=>{
    const cbName='sigap_fetch_'+Date.now();
    const script=document.createElement('script');
    const to=setTimeout(()=>{delete window[cbName];try{document.body.removeChild(script);}catch(e){}resolve();},8000);
    window[cbName]=function(data){
      clearTimeout(to);delete window[cbName];try{document.body.removeChild(script);}catch(e){};
      if(data?.jobs?.length){
        console.log('Fetched from Sheets:', data.jobs.length, 'jobs');
        console.log('First job status:', data.jobs[0]?.status);
        const ids=data.jobs.map(j=>j.id);
        const local=jobs.filter(j=>!ids.includes(j.id));
        jobs=[...data.jobs,...local];saveJobs();
      } else {
        console.log('No jobs from Sheets or empty array');
      }
      resolve();
    };
    script.src=GAS_URL+'?action=getJobs&callback='+cbName;
    script.onerror=()=>{clearTimeout(to);resolve();};
    document.body.appendChild(script);
  });
}

function saveNewUnit(){
  const name=document.getElementById('nu-name').value.trim();
  const id=document.getElementById('nu-id').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name||!id){alert('Nama unit dan ID wajib diisi!');return;}

  const parseLines=(elId)=>document.getElementById(elId).value.split('\n').map(s=>s.trim()).filter(Boolean);

  const measures=parseLines('nu-measures').map(line=>{
    const parts=line.split('|').map(s=>s.trim());
    return {l:parts[0]||line, n:parts[1]||'', u:parts[2]||'', wajib:(parts[3]||'').toLowerCase().includes('wajib')};
  });

  const newUnitData={
    safety:{level:'warn', text:document.getElementById('nu-safety').value.trim()||'Cabut steker sebelum membuka unit.'},
    keluhan:parseLines('nu-keluhan'),
    kondisi_fisik:parseLines('nu-fisik'),
    kondisi_teknis:parseLines('nu-teknis'),
    gejala:[],
    tindakan_service:parseLines('nu-tindakan'),
    tindakan_diagnosa:['Pengecekan visual','Pengukuran parameter','Identifikasi masalah'],
    measures:measures,
    critical:parseLines('nu-critical'),
    photos_t1:['Before','Nameplate','Area masalah'],
    photos_t2:['After','Komponen diganti','Hasil akhir']
  };

  // Tambah ke UNITS jika belum ada
  if(!UNITS.find(u=>u.id===id)){
    UNITS.push({id, name, sub:document.getElementById('nu-sub').value.trim()||name, icon:'ti-tool', color:'#185FA5', bg:'#E6F1FB'});
    JOB_TYPES[id]=[
      {id:'service', name:'Service / Perbaikan', desc:'Diagnosa & perbaikan', icon:'ti-tool'},
      {id:'diagnosa', name:'Pengecekan', desc:'Pemeriksaan rutin', icon:'ti-stethoscope'},
    ];
  }

  // Simpan ke sessionStorage
  try{
    const existing=JSON.parse(sessionStorage.getItem('sigap_custom_units')||'{}');
    existing[id]=newUnitData;
    sessionStorage.setItem('sigap_custom_units',JSON.stringify(existing));
    UNIT_DATA[id]=newUnitData;
  }catch(e){console.error(e);}

  alert('Unit "'+name+'" berhasil ditambahkan! Sekarang tersedia di pilihan form.');
  navTo('form');
  renderUnitSelect();
}

// PIN login handler
document.getElementById('pin-input').addEventListener('keyup',e=>{if(e.key==='Enter')doLogin();});
</script>
